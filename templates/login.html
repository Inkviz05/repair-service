<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; min-height: 100vh; display: grid; place-items: center; background: #eef2ff; }
    .card { background: #fff; border-radius: 10px; padding: 24px; width: 320px; box-shadow: 0 2px 10px rgba(0,0,0,.1); }
    input, button { width: 100%; margin-top: 10px; padding: 10px; border-radius: 6px; border: 1px solid #d1d5db; }
    button { background: #1d4ed8; color: #fff; border-color: #1d4ed8; cursor: pointer; }
    .error { color: #b91c1c; margin-top: 8px; }
  </style>
</head>
<body>
  <form class="card" method="post">
    <h2>Вход</h2>
    <p>Введите логин и пароль</p>
    {% csrf_token %}
    <input name="username" placeholder="username" required>
    <input name="password" type="password" placeholder="password" required>
    <button type="submit">Войти</button>
    {% if messages %}
      {% for message in messages %}
        <p class="error">{{ message }}</p>
      {% endfor %}
    {% endif %}
  </form>
</body>
</html>
